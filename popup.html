<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=420, initial-scale=1.0" />
    <title>Big Favorites</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="app" aria-live="polite">
      <header class="app__header">
        <h1><span aria-hidden="true">⭐</span> Big Favorites</h1>
        <p class="subtitle" title="No broad host permissions are requested. Use the button below to enable toolbar on the current tab.">
          Popup launcher + on-demand in-page toolbar
        </p>
      </header>

      <section class="toolbar" aria-label="Launcher controls">
        <label class="field" title="Choose where bookmark clicks open.">
          <span class="field__label">🧭 Open bookmarks in</span>
          <select id="openModeSelect" class="field__control">
            <option value="current">Current tab</option>
            <option value="new">New tab</option>
          </select>
        </label>

        <button id="refreshButton" class="refresh" type="button" title="Reload bookmarks now">🔄 Refresh</button>
      </section>

      <section class="actions" aria-label="In-page toolbar actions">
        <button
          id="enableToolbarButton"
          class="action-btn"
          type="button"
          title="Inject the Big Favorites toolbar into the active tab using activeTab permission"
        >
          🧩 Enable in-page toolbar on this tab
        </button>
      </section>

      <section id="status" class="status" role="status">Loading bookmarks…</section>

      <section id="bookmarksGrid" class="grid" aria-label="Bookmarks toolbar shortcuts"></section>
    </main>

    <script src="popup.js" type="module"></script>
  </body>
</html>
